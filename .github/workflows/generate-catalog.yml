name: Generate Catalog

on:
  push:
    # Only trigger when manifest files change.
    # No need to regenerate catalog when
    # run.py or Dockerfile change.
    paths:
      - "automations/**/manifest.yaml"
      - "catalog/generate_catalog.py"

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    # Need write permission to commit catalog.json back
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN for auth
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate catalog
        run: python catalog/generate_catalog.py

      - name: Commit updated catalog
        run: |
          git config user.name "automation-hub-bot"
          git config user.email "automation-hub-bot@users.noreply.github.com"
          git add catalog.json

          # Only commit if catalog.json actually changed.
          # git diff --staged --quiet exits 0 if no changes.
          # The || true prevents the step from failing
          # if there is nothing to commit.
          if git diff --staged --quiet; then
            echo "catalog.json unchanged. Nothing to commit."
          else
            git commit -m "chore: regenerate catalog [skip ci]"
            git push
          fi